<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Usuários – NutriConecta</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand" href="/">🥗 NutriConecta</a>
    </div>
</nav>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>👥 Usuários</h2>
        <a href="/usuarios/novo" class="btn btn-success">+ Novo Usuário</a>
    </div>
    <table class="table table-striped table-hover shadow-sm">
        <thead class="table-success">
        <tr>
            <th>#</th>
            <th>Nome</th>
            <th>Email</th>
            <th>Tipo</th>
            <th>Telefone</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u : ${usuarios}">
            <td th:text="${u.id}"></td>
            <td th:text="${u.nome}"></td>
            <td th:text="${u.email}"></td>
            <td th:text="${u.tipo}"></td>
            <td th:text="${u.telefone}"></td>
            <td>
                <a th:href="@{/usuarios/editar/{id}(id=${u.id})}" class="btn btn-sm btn-warning">Editar</a>
                <a th:href="@{/usuarios/deletar/{id}(id=${u.id})}" class="btn btn-sm btn-danger"
                   onclick="return confirm('Deseja excluir?')">Excluir</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
