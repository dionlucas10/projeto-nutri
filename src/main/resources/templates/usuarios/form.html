<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulário de Usuário – NutriConecta</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand" href="/">🥗 NutriConecta</a>
    </div>
</nav>
<div class="container mt-4">
    <h2>Cadastro de Usuário</h2>
    <form th:action="@{/usuarios/salvar}" th:object="${usuario}" method="post" class="mt-3">
        <input type="hidden" th:field="*{id}">
        <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" th:field="*{nome}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" th:field="*{email}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Senha</label>
            <input type="password" th:field="*{senha}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Tipo</label>
            <select th:field="*{tipo}" class="form-select">
                <option th:each="t : ${tipos}" th:value="${t}" th:text="${t}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Telefone</label>
            <input type="text" th:field="*{telefone}" class="form-control">
        </div>
        <button type="submit" class="btn btn-success">Salvar</button>
        <a href="/usuarios/listar" class="btn btn-secondary ms-2">Cancelar</a>
    </form>
</div>
</body>
</html>
