<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Solicitação</title>
    <link href="/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="fragments/header :: header"></div>
    
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <h2>Cadastro de Solicitação</h2>
                <form th:action="@{/solicitacoes/salvar}" method="post" th:object="${solicitacao}">
                    <div class="mb-3">
                        <label for="descricao" class="form-label">Descrição</label>
                        <textarea class="form-control" id="descricao" th:field="*{descricao}" rows="3" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="dataSolicitacao" class="form-label">Data da Solicitação</label>
                        <input type="date" class="form-control" id="dataSolicitacao" th:field="*{dataSolicitacao}" required>
                    </div>
                    <div class="mb-3">
                        <label for="status" class="form-label">Status</label>
                        <select class="form-control" id="status" th:field="*{status}">
                            <option value="PENDENTE">Pendente</option>
                            <option value="APROVADA">Aprovada</option>
                            <option value="REJEITADA">Rejeitada</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                    <a href="/solicitacoes/listar" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
    
    <div th:replace="fragments/footer :: footer"></div>
</body>
</html>
