<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Retirada</title>
    <link href="/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{/fragments/header :: header}"></div>
    
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <h2>Cadastro de Retirada</h2>
                <form th:action="@{/retiradas/salvar}" method="post" th:object="${retirada}">
                    <div class="mb-3">
                        <label for="dataRetirada" class="form-label">Data da Retirada</label>
                        <input type="datetime-local" class="form-control" id="dataRetirada" th:field="*{dataRetirada}" required>
                    </div>
                    <div class="mb-3">
                        <label for="observacoes" class="form-label">Observações</label>
                        <textarea class="form-control" id="observacoes" th:field="*{observacoes}" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                    <a href="/retiradas/listar" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
    
    <div th:replace="~{/fragments/footer :: footer}"></div>
</body>
</html>
