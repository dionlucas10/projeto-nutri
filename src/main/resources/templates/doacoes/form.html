<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulário de Doação – NutriConecta</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand" href="/">🥗 NutriConecta</a>
    </div>
</nav>
<div class="container mt-4">
    <h2>Cadastro de Doação</h2>
    <form th:action="@{/doacoes/salvar}" th:object="${doacao}" method="post" class="mt-3">
        <input type="hidden" th:field="*{id}">
        <div class="mb-3">
            <label class="form-label">Título</label>
            <input type="text" th:field="*{titulo}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Descrição</label>
            <textarea th:field="*{descricao}" class="form-control" rows="3"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Quantidade</label>
            <input type="number" th:field="*{quantidade}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Data de Expiração</label>
            <input type="date" th:field="*{dataExpiracao}" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Status</label>
            <select th:field="*{status}" class="form-select">
                <option th:each="s : ${statusList}" th:value="${s}" th:text="${s.descricao}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Doador</label>
            <select th:field="*{doador}" class="form-select">
                <option value="">-- Selecione --</option>
                <option th:each="u : ${usuarios}" th:value="${u.id}" th:text="${u.nome}"></option>
            </select>
        </div>
        <button type="submit" class="btn btn-success">Salvar</button>
        <a href="/doacoes/listar" class="btn btn-secondary ms-2">Cancelar</a>
    </form>
</div>
</body>
</html>
