<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Doações – NutriConecta</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div th:replace="~{/fragments/header :: header}"></div>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>🎁 Doações</h2>
        <a href="/doacoes/nova" class="btn btn-success">+ Nova Doação</a>
    </div>
    <table class="table table-striped table-hover shadow-sm">
        <thead class="table-success">
        <tr>
            <th>#</th>
            <th>Título</th>
            <th>Doador</th>
            <th>Quantidade</th>
            <th>Status</th>
            <th>Expira em</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="d : ${doacoes}">
            <td th:text="${d.id}"></td>
            <td th:text="${d.titulo}"></td>
            <td th:text="${d.doador != null ? d.doador.nome : '-'}"></td>
            <td th:text="${d.quantidade}"></td>
            <td>
                <span class="badge"
                      th:classappend="${d.status.name() == 'ABERTA'} ? 'bg-success' :
                                      (${d.status.name() == 'CANCELADA'} ? 'bg-danger' : 'bg-warning text-dark')"
                      th:text="${d.status.descricao}"></span>
            </td>
            <td th:text="${d.dataExpiracao}"></td>
            <td>
                <a th:href="@{/doacoes/editar/{id}(id=${d.id})}" class="btn btn-sm btn-warning">Editar</a>
                <a th:href="@{/doacoes/deletar/{id}(id=${d.id})}" class="btn btn-sm btn-danger"
                   onclick="return confirm('Cancelar doação?')">Cancelar</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
