<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Alimentos</title>
    <link href="/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:insert="~{/fragments/header :: header}"></div>
    
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <h2>Cadastro de Alimento</h2>
                <form th:action="@{/alimentos/salvar}" method="post" th:object="${alimento}">
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome</label>
                        <input type="text" class="form-control" id="nome" th:field="*{nome}" required>
                    </div>
                    <div class="mb-3">
                        <label for="categoria" class="form-label">Categoria</label>
                        <input type="text" class="form-control" id="categoria" th:field="*{categoria}" required>
                    </div>
                    <div class="mb-3">
                        <label for="unidadeMedida" class="form-label">Unidade de Medida</label>
                        <input type="text" class="form-control" id="unidadeMedida" th:field="*{unidadeMedida}" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                    <a href="/alimentos/listar" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
    
    <div th:insert="~{/fragments/footer :: footer}"></div>
</body>
</html>
